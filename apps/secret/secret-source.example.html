<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>秘密页面 | Jerry</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17211e;
        --muted: #5f6f6a;
        --paper: #fbfcf8;
        --wash: #eef5f2;
        --teal: #0f766e;
        --gold: #c39b37;
        --line: #d8e0dc;
        --charcoal: #24302d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        color: var(--ink);
        background: var(--paper);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .secret-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 68px;
        padding: 14px clamp(18px, 5vw, 72px);
        border-bottom: 1px solid rgba(216, 224, 220, 0.8);
        background: rgba(251, 252, 248, 0.9);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 760;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        color: #fff;
        background: var(--charcoal);
        border-radius: 8px;
      }

      .state {
        color: var(--teal);
        font-size: 0.86rem;
        font-weight: 820;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
        gap: clamp(28px, 6vw, 84px);
        align-items: center;
        min-height: calc(100svh - 68px);
        padding: clamp(42px, 7vw, 94px) clamp(18px, 5vw, 72px);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--teal);
        font-size: 0.78rem;
        font-weight: 850;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      p {
        overflow-wrap: anywhere;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(3rem, 8vw, 6.8rem);
        line-height: 1.08;
      }

      .lede {
        max-width: 680px;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: 1.18rem;
        line-height: 1.85;
      }

      .proof-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 34px;
        max-width: 640px;
      }

      .proof-item {
        min-height: 116px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .proof-item strong {
        display: block;
        margin-bottom: 8px;
        color: var(--charcoal);
      }

      .proof-item span {
        color: var(--muted);
        line-height: 1.6;
      }

      .seal {
        position: relative;
        display: grid;
        place-items: center;
        aspect-ratio: 1;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(135deg, #fff, var(--wash));
        box-shadow: 0 24px 70px rgba(24, 34, 31, 0.12);
        overflow: hidden;
      }

      .seal::before,
      .seal::after {
        position: absolute;
        content: "";
        border: 2px solid rgba(15, 118, 110, 0.26);
        border-radius: 999px;
      }

      .seal::before {
        inset: 12%;
      }

      .seal::after {
        inset: 24%;
        border-color: rgba(217, 93, 79, 0.24);
      }

      .seal-text {
        position: relative;
        display: grid;
        place-items: center;
        width: 42%;
        aspect-ratio: 1;
        color: #fff;
        background: var(--teal);
        border-radius: 8px;
        font-size: clamp(2rem, 6vw, 4rem);
        font-weight: 900;
      }

      .footer-note {
        margin-top: 34px;
        color: var(--gold);
        font-weight: 820;
      }

      @media (max-width: 820px) {
        .hero {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .seal {
          order: -1;
          max-width: 360px;
        }
      }

      @media (max-width: 560px) {
        .secret-header {
          align-items: flex-start;
          flex-direction: column;
          gap: 10px;
        }

        .proof-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="secret-header">
      <a class="brand" href="../../index.html" aria-label="返回 Jerry 首页">
        <span class="brand-mark">J</span>
        <span>Jerry</span>
      </a>
      <span class="state">Decrypted</span>
    </header>
    <main class="hero">
      <section>
        <p class="eyebrow">Secret App</p>
        <h1>秘密页面已解锁</h1>
        <p class="lede">
          这份完整 HTML 来自浏览器端解密后的明文。你可以在本地修改
          apps/secret/private/page.html，然后运行加密脚本重新生成公开密文。
        </p>
        <div class="proof-grid" aria-label="渲染验证">
          <div class="proof-item">
            <strong>结构</strong>
            <span>页面包含独立的头部、正文、响应式布局和内联样式。</span>
          </div>
          <div class="proof-item">
            <strong>来源</strong>
            <span>当前 DOM 是运行时解密后写入的结果，而不是初始加载器。</span>
          </div>
        </div>
        <p class="footer-note">正确密码通过，渲染完成。</p>
      </section>
      <div class="seal" aria-hidden="true">
        <div class="seal-text">秘</div>
      </div>
    </main>
  </body>
</html>
