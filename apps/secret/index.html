<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="一个浏览器端密码解密后才渲染正确页面的静态 demo。"
    />
    <title>秘密 | Jerry</title>
    <link rel="stylesheet" href="style.css" />
    <script src="payload.js" defer></script>
    <script src="secret-loader.js" defer></script>
  </head>
  <body>
    <header class="secret-header" aria-label="秘密应用导航">
      <a class="brand" href="../../index.html" aria-label="返回 Jerry 首页">
        <span class="brand-mark">J</span>
        <span>Jerry</span>
      </a>
      <span class="mode-label">Encrypted page</span>
    </header>

    <main class="secret-shell">
      <section class="unlock-panel" aria-labelledby="secret-title">
        <p class="eyebrow">Secret App</p>
        <h1 id="secret-title">秘密</h1>
        <p class="intro">
          输入正确密码后，浏览器会把仓库中的密文解密为完整 HTML，并用解密结果替换当前页面。
        </p>

        <form id="unlock-form" class="unlock-form">
          <label for="secret-password">密码</label>
          <div class="password-row">
            <input
              id="secret-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
            <button id="unlock-button" type="submit">解锁</button>
          </div>
          <p id="unlock-status" class="status" role="alert" aria-live="polite"></p>
        </form>
      </section>

      <aside class="cipher-panel" aria-label="密文状态">
        <span class="cipher-index">AES-GCM</span>
        <h2>页面内容当前仍是密文</h2>
        <p>
          错误密码无法通过认证标签校验，加载器会停留在这里，不会写入正确页面。
        </p>
      </aside>
    </main>
  </body>
</html>
